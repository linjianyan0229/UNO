# 本地开发用的 MySQL(root/123456,库 uno,端口 3306)
# 启动: docker compose -f docker-compose.mysql.yaml up -d
# 停止: docker compose -f docker-compose.mysql.yaml down   (加 -v 连数据卷一起删)
services:
  mysql:
    image: mysql:8.0
    container_name: uno-mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: "uno"
    ports:
      - "3306:3306"
    volumes:
      - uno-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p123456"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  uno-mysql-data:
